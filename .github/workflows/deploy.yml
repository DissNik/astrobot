name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy bot
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            -czf /tmp/astrobot-deploy.tar.gz .

      - name: Upload deployment archive
        run: |
          scp -i ~/.ssh/deploy_key \
            -P "${{ secrets.SSH_PORT }}" \
            /tmp/astrobot-deploy.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/astrobot-deploy.tar.gz"

      - name: Deploy over SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'bash -se' <<'EOF'
          set -euo pipefail

          cd /opt/astrobot/app

          find . -mindepth 1 -maxdepth 1 \
            ! -name '.venv' \
            ! -name '.env' \
            ! -name 'data' \
            -exec rm -rf {} +

          tar -xzf /tmp/astrobot-deploy.tar.gz -C /opt/astrobot/app
          rm /tmp/astrobot-deploy.tar.gz

          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

          set -a
          . /etc/astrobot/astrobot.env
          set +a

          .venv/bin/python scripts/run_migrations.py

          sudo /usr/bin/systemctl restart astrobot
          sudo /usr/bin/systemctl status astrobot --no-pager
          EOF
